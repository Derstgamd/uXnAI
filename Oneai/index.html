<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perception</title>

    <!-- DNS prefetch for external origins -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://uxnai.onrender.com" />

    <!-- Non-render-blocking font load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Critical inline CSS: prevents white flash before React hydrates -->
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body,#root{width:100%;height:100%;background:#0a0a0a;color:#f0f0f0;font-family:'Open Sans',system-ui,sans-serif}
      #root-spinner{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a0a;z-index:9999}
      .rs-dot{width:7px;height:7px;border-radius:50%;background:#e8ff47;animation:rsp 1s ease-in-out infinite}
      @keyframes rsp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
    </style>
  </head>
  <body>
    <!-- Native spinner visible instantly, removed once React mounts -->
    <div id="root-spinner"><div class="rs-dot"></div></div>
    <div id="root"></div>
    <!-- Wake up Render backend — async so it never blocks the parser -->
    <script async>
      fetch('https://uxnai.onrender.com/health').catch(()=>{})
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
